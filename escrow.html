<script>

const fundBtn = document.getElementById("fundBtn");
const statusText = document.getElementById("status");

const connection = new solanaWeb3.Connection(
  solanaWeb3.clusterApiUrl("devnet"),
  "confirmed"
);

// YOUR DEPLOYED PROGRAM ID
const PROGRAM_ID = new solanaWeb3.PublicKey("PASTE_PROGRAM_ID_HERE");

fundBtn.addEventListener("click", async () => {

  try {

    if (!window.solana || !window.solana.isPhantom) {
      alert("Connect Phantom Wallet first");
      return;
    }

    const provider = window.solana;

    // connect wallet if not already connected
    const resp = await provider.connect();
    const sender = resp.publicKey;

    // amount from input
    const amount = document.getElementById("amountInput").value;

    if (!amount || amount <= 0) {
      alert("Enter valid amount");
      return;
    }

    // convert SOL to lamports
    const lamports = amount * solanaWeb3.LAMPORTS_PER_SOL;

    // TEMP escrow wallet (replace later)
    const escrowWallet = new solanaWeb3.PublicKey(
      "PASTE_RECEIVER_WALLET_HERE"
    );

    // create transaction
    const transaction = new solanaWeb3.Transaction().add(

      solanaWeb3.SystemProgram.transfer({
        fromPubkey: sender,
        toPubkey: escrowWallet,
        lamports: lamports,
      })

    );

    transaction.feePayer = sender;

    let blockhashObj = await connection.getLatestBlockhash();

    transaction.recentBlockhash = blockhashObj.blockhash;

    // sign transaction
    const signed = await provider.signTransaction(transaction);

    // send transaction
    const signature = await connection.sendRawTransaction(
      signed.serialize()
    );

    await connection.confirmTransaction(signature);

    statusText.innerHTML =
      "✅ Escrow funded successfully.<br>TX: " + signature;

  } catch (err) {

    console.error(err);

    statusText.innerHTML =
      "❌ Transaction failed";

  }

});

</script>
